<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translation Tool</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Language Translation Tool</h1>
        <div class="wrapper">
            <div class="text-input">
                <textarea spellcheck="false" class="from-text" placeholder="Enter text to translate"></textarea>
                <textarea spellcheck="false" class="to-text" placeholder="Translation will appear here" readonly></textarea>
            </div>
            <ul class="controls">
                <li class="row from">
                    <div class="icons">
                        <i id="from-speech" class="fas fa-volume-up"></i>
                        <i id="from-copy" class="fas fa-copy"></i>
                    </div>
                    <select class="from-lang"></select>
                </li>
                <li class="exchange"><i class="fas fa-exchange-alt"></i></li>
                <li class="row to">
                    <select class="to-lang"></select>
                    <div class="icons">
                        <i id="to-speech" class="fas fa-volume-up"></i>
                        <i id="to-copy" class="fas fa-copy"></i>
                    </div>
                </li>
            </ul>
        </div>
        <button class="translate-btn">Translate Text</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
